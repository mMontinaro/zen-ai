services:
  postgres:
    image: postgres:16

    container_name: workspace-postgres

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api

    container_name: workspace-api

    ports:
      - "8000:8000"

    depends_on:
      - postgres
  
  ollama:
    image: ollama/ollama:latest
    container_name: workspace-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  
  frontend:
    build:
      context: ./frontend

    container_name: workspace-frontend

    ports:
      - "3000:3000"

    depends_on:
      - api

volumes:
  postgres_data:
  ollama_data: